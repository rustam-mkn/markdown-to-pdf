<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: #f5f5f5;
        }
        
        .card {
            width: 1080px;
            background: white;
            margin: 0 auto 20px;
            padding: 60px 80px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            page-break-after: always;
        }
        
        .card-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 80px;
            text-align: center;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.3;
            margin: -60px -80px 60px;
        }
        
        .card-content h2 {
            font-size: 32px;
            font-weight: 700;
            margin: 40px 0 24px;
            color: #000;
        }
        
        .card-content h3 {
            font-size: 28px;
            font-weight: 600;
            margin: 32px 0 20px;
            color: #000;
        }
        
        .card-content p {
            font-size: 22px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #333;
        }
        
        .card-content ul {
            list-style: none;
            margin: 20px 0;
        }
        
        .card-content li {
            font-size: 22px;
            line-height: 1.8;
            margin-bottom: 12px;
            padding-left: 30px;
            position: relative;
            color: #333;
        }
        
        .card-content li:before {
            content: "•";
            position: absolute;
            left: 0;
            font-weight: bold;
            font-size: 28px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            font-size: 20px;
        }
        
        th {
            background: #f8f9fa;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #dee2e6;
            color: #000;
        }
        
        td {
            padding: 16px;
            border: 1px solid #dee2e6;
            color: #333;
            vertical-align: top;
        }
        
        .checklist {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 8px;
            margin: 24px 0;
        }
        
        .checklist-item {
            font-size: 22px;
            padding: 12px 0;
            color: #333;
        }
        
        .highlight-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 24px;
            margin: 24px 0;
            font-size: 22px;
            color: #333;
        }
        
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 24px;
            margin: 24px 0;
            font-size: 22px;
            color: #333;
        }
        
        strong {
            font-weight: 600;
            color: #000;
        }
        
        .emoji {
            font-style: normal;
        }
    </style>
</head>
<body>
    <!-- Карточки будут генерироваться здесь -->
</body>
</html>
